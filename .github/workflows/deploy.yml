name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build image
        run: docker build -t api:latest .

      - name: save image
        run: docker save api:latest | gzip > image.tar.gz

      - name: send image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: gab
          key: ${{ secrets.SSH_KEY }}
          source: image.tar.gz
          target: /home/gab/

      - name: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: gab
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/gab
            bash deploy.sh